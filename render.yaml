services:
  - type: web
    name: outmate-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL_NAME
        value: claude-sonnet-4-6
      - key: MAX_RETRIES
        value: "3"
      - key: RATE_LIMIT_RPM
        value: "60"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: CORS_ORIGINS
        value: https://outmate-frontend.onrender.com

  - type: web
    name: outmate-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: outmate-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://outmate-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
